# .github/workflows/deploy.yml
name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:  # ручной запуск

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build & Push Backend ────────────────────────
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: focusflow-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build & Push Frontend ───────────────────────
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          load: true
          tags: focusflow-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deploy via SSH ──────────────────────────────
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            echo "🔄 Pulling latest code..."
            cd /opt/focusflow
            git pull origin main
            
            echo "🔐 Loading environment variables..."
            # .env не коммитится, должен быть на сервере
            if [ ! -f .env ]; then
              echo "❌ .env not found on server! Create it first."
              exit 1
            fi
            
            echo "🐳 Building and starting containers..."
            docker compose pull
            docker compose up -d --build --remove-orphans
            
            echo "🧹 Cleaning up..."
            docker system prune -af --volumes
            
            echo "✅ Deployment complete. Checking health..."
            sleep 10
            curl -f http://localhost:8000/api/health || exit 1
            echo "🎉 All services healthy!"

      # ── Notify (optional) ───────────────────────────
      - name: Notify on success
        if: success()
        run: echo "✅ Deployed ${{ github.sha }} to production"
