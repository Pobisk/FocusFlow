# .github/workflows/deploy.yml
name: Deploy to VPS

on:
  workflow_dispatch:
  # workflow_run:
  #   workflows: ["Build & Push Backend Image", "Build & Push Frontend Image"]
  #   types: [completed]
  #   branches: [main]

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/focusflow-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/focusflow-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    # depends_on:
    #   - build-backend
    #   - build-frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Deploy via SSH (только pull, без сборки!) ──────────────────────
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          command_timeout: 20m
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: BACKEND_IMAGE,FRONTEND_IMAGE,REGISTRY,OWNER
          script: |
            set -e
            cd /opt/focusflow
            
            echo "🔐 Logging in to GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${OWNER}" --password-stdin
            
            # 📦 Умная загрузка backend (пропускаем если образ не изменился)
            echo "📦 Checking backend image..."
            REMOTE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${BACKEND_IMAGE}:latest" 2>/dev/null || echo "")
            if [ -n "${REMOTE_DIGEST}" ]; then
              echo "✅ Backend image already present: ${REMOTE_DIGEST}"
            else
              echo "⬇️ Pulling backend:latest..."
              docker pull "${BACKEND_IMAGE}:latest"
            fi
            
            # 📦 Умная загрузка frontend
            echo "📦 Checking frontend image..."
            REMOTE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${FRONTEND_IMAGE}:latest" 2>/dev/null || echo "")
            if [ -n "${REMOTE_DIGEST}" ]; then
              echo "✅ Frontend image already present: ${REMOTE_DIGEST}"
            else
              echo "⬇️ Pulling frontend:latest..."
              docker pull "${FRONTEND_IMAGE}:latest"
            fi
            
            # 🚀 Запускаем контейнеры (БЕЗ --build!)
            echo "🚀 Starting services..."
            docker compose up -d --remove-orphans
            
            # 🧹 Очистка старых образов (но не текущих!)
            echo "🧹 Cleaning dangling images..."
            docker image prune -f
            
            # ✅ Health check
            echo "✅ Checking health..."
            sleep 15
            curl -f http://localhost:8000/api/health || { echo "❌ Backend unhealthy"; exit 1; }
            echo "🎉 Deployment successful!"
