# .github/workflows/deploy.yml
name: Deploy to VPS

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: pobisk
  BACKEND_IMAGE: ghcr.io/pobisk/focusflow-backend
  FRONTEND_IMAGE: ghcr.io/pobisk/focusflow-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          command_timeout: 20m
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: BACKEND_IMAGE,FRONTEND_IMAGE
          script: |
            set -e
            cd /opt/focusflow
            
            echo "🔄 Starting deployment..."
            
            # 🔐 Авторизация в GHCR
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin 2>/dev/null || true
            
            # 📦 Всегда pull — Docker сам проверит, нужно ли скачивать
            echo "📦 Pulling backend:latest..."
            docker pull "${BACKEND_IMAGE}:latest"
            
            echo "📦 Pulling frontend:latest..."
            docker pull "${FRONTEND_IMAGE}:latest"
            
            # 🚀 Запускаем контейнеры — БЕЗ --build!
            echo "🚀 Starting services..."
            docker compose up -d --remove-orphans
            
            # 🧹 Очистка: удаляем только dangling образы
            echo "🧹 Cleaning dangling images..."
            docker image prune -f
            
            # ✅ Health check с увеличенным временем ожидания
            echo "✅ Checking health..."
            sleep 25
            if curl -f http://localhost/api/health &>/dev/null; then
              echo "🎉 Deployment successful!"
            else
              echo "❌ Backend health check failed!"
              docker compose logs backend --tail=50
              exit 1
            fi
